<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DEVANO · ERP Industrial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #c9c8c1; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  input, select, textarea, button { font-family: inherit; }
  @keyframes fx-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fx-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fx-pop { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes fx-grid { from { background-position: 0 0; } to { background-position: 44px 44px; } }
  @keyframes fx-toast { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fx-bar { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  @keyframes fx-drawer { from { transform: translateX(-100%); } to { transform: translateX(0); } }

  /* ===== Responsive / móvil ===== */
  .menu-btn{ display:none; }
  .mobile-overlay{ display:none; }
  @media (max-width: 860px){
    /* App shell: apila y deja que la página haga scroll */
    .app-shell{ flex-direction:column !important; height:auto !important; min-height:100vh !important; overflow:visible !important; }
    .main{ min-width:0 !important; }
    .content{ padding:16px !important; overflow-y:visible !important; }

    /* Botón hamburguesa + barra superior */
    .menu-btn{ display:inline-flex !important; align-items:center; justify-content:center; }
    .topbar{ position:sticky; top:0; z-index:40; padding:0 14px !important; gap:10px !important; }
    .topbar-search{ display:none !important; }

    /* Sidebar como cajón deslizante */
    .sidebar{ position:fixed !important; top:0; left:0; height:100vh !important; z-index:70;
      transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 50px rgba(0,0,0,.45); }
    .sidebar.open{ transform:translateX(0); animation:fx-drawer .25s ease both; }
    .mobile-overlay{ display:block; position:fixed; inset:0; background:rgba(20,22,26,.5); z-index:65; }

    /* Grids -> una columna */
    .grid-kpis{ grid-template-columns:1fr 1fr !important; }
    .grid-2, .grid-cot, .grid-3, .modal-grid, .modal-grid-3{ grid-template-columns:1fr !important; }

    /* Tabla con scroll horizontal */
    .table-card{ overflow-x:auto !important; }
    .table-card table{ min-width:680px; }

    /* Cotizador: menos padding */
    .cot-doc{ padding:20px 16px !important; }

    /* Login: ocultar panel de marca, ampliar formulario */
    .login-wrap{ flex-direction:column !important; }
    .login-left{ display:none !important; }
    .login-right{ flex:1 1 auto !important; padding:28px 22px !important; }
  }
  @media (max-width: 480px){
    .grid-kpis{ grid-template-columns:1fr !important; }
    .role-box{ display:none !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
(function(){

/* ============================================================
   DEVANO · ERP Industrial
   Standalone implementation of the Claude Design "Sistema DEVANO".
   Pure vanilla JS — reactive state + string-template rendering.
   ============================================================ */

/* ---------- static data ---------- */
const CATS = ['Ferretería','Seguridad','Herramientas','Eléctrico','Plomería','Construcción'];
const CAT_COLORS = { 'Ferretería':'#3B6B8F', 'Seguridad':'#C2891C', 'Herramientas':'#7C5A8C', 'Eléctrico':'#2A9D8F', 'Plomería':'#3D7BB5', 'Construcción':'#B5663A' };
const MONTHLY = [ {m:'Nov',v:182},{m:'Dic',v:210},{m:'Ene',v:168},{m:'Feb',v:195},{m:'Mar',v:224},{m:'Abr',v:248},{m:'May',v:236},{m:'Jun',v:268} ];
const SUPPLIERS_META = {
  'Aceros del Sur':{rubro:'Acero · construcción', rating:4.8, entregas:98},
  'FerroAndes':{rubro:'Ferretería general', rating:4.6, entregas:95},
  'Industrias Lima':{rubro:'Herramientas · pinturas', rating:4.5, entregas:92},
  'ProSafety EIRL':{rubro:'Equipos de seguridad', rating:4.9, entregas:99},
  'ElectroPerú SAC':{rubro:'Material eléctrico', rating:4.2, entregas:88},
  'HidroTec':{rubro:'Plomería · bombas', rating:4.4, entregas:90},
};
const USERS_DATA = [
  { name:'Carlos Medina', email:'carlos@devano.pe', role:'Administrador', status:'Activo', last:'hace 5 min', av:'#3B6B8F' },
  { name:'Lucía Torres', email:'lucia@devano.pe', role:'Vendedor', status:'Activo', last:'hace 2 h', av:'#C2891C' },
  { name:'Jorge Ramos', email:'jorge@devano.pe', role:'Almacén', status:'Activo', last:'ayer', av:'#2A9D8F' },
  { name:'Ana Quispe', email:'ana@devano.pe', role:'Vendedor', status:'Activo', last:'hace 3 d', av:'#7C5A8C' },
  { name:'Pedro Salas', email:'pedro@devano.pe', role:'Almacén', status:'Inactivo', last:'hace 2 sem', av:'#9a9ea4' },
];
const ICONS = {
  dashboard:'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z',
  productos:'M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96 12 12.01l8.73-5.05M12 22.08V12',
  cotizador:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8',
  reportes:'M3 3v18h18M18 17V9M13 17V5M8 17v-3',
  proveedores:'M10 17h4V5H2v12h3M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5v8h1M5.5 17a2 2 0 1 0 4 0 2 2 0 1 0-4 0M16.5 17a2 2 0 1 0 4 0 2 2 0 1 0-4 0',
  usuarios:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75',
};
const ROLE_PERMS = {
  dashboard: ['Administrador','Vendedor','Almacén'],
  productos: ['Administrador','Vendedor','Almacén'],
  cotizador: ['Administrador','Vendedor'],
  reportes:  ['Administrador','Vendedor'],
  proveedores:['Administrador','Almacén'],
  usuarios:  ['Administrador'],
};

/* ---------- format helpers ---------- */
const m  = (n) => 'S/ ' + (Number(n)||0).toLocaleString('es-PE',{minimumFractionDigits:2, maximumFractionDigits:2});
const mk = (n) => 'S/ ' + (Math.round(Number(n)/1000)) + 'k';
const num = (n) => (Number(n)||0).toLocaleString('es-PE');
const margenPct = (p) => p.compra ? ((p.venta - p.compra)/p.compra)*100 : 0;
const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ---------- state ---------- */
let STATE = {
  screen: 'login',
  role: 'Administrador',
  nav: 'dashboard',
  menuOpen: false,    // cajón lateral en móvil
  loginUser: 'admin@devano.pe',
  loginPass: '',
  search: '',
  cat: 'Todas',
  modal: null,        // null | 'new' | id
  draft: null,
  confirmDel: null,
  toast: null,
  quoteAddSel: '',
  quote: {
    cliente: 'Constructora Vega S.A.C.',
    ruc: '20512345678',
    items: [ { sku: 'CS-IND', qty: 40 }, { sku: 'GS-NTR', qty: 120 }, { sku: 'BR-PRO', qty: 25 } ],
    addLabel: 'Flete e instalación',
    addCost: 480,
    notas: 'Entrega en obra (Lurín). Incluye certificados de calidad. Precios sujetos a stock.',
  },
  products: [
    { id:1, sku:'RD-6204', nombre:'Rodamiento rígido de bolas 6204', cat:'Ferretería', prov:'FerroAndes', stock:240, stockMin:80, compra:8.5, venta:14.9, ventas:320, unidad:'und' },
    { id:2, sku:'VL-2PG', nombre:'Válvula de bola 2" bronce', cat:'Plomería', prov:'HidroTec', stock:65, stockMin:40, compra:42, venta:69, ventas:145, unidad:'und' },
    { id:3, sku:'TB-PVC4', nombre:'Tubería PVC 4" x 3m', cat:'Plomería', prov:'HidroTec', stock:18, stockMin:50, compra:28, venta:41, ventas:210, unidad:'und' },
    { id:4, sku:'CS-IND', nombre:'Casco de seguridad industrial', cat:'Seguridad', prov:'ProSafety EIRL', stock:410, stockMin:100, compra:12, venta:22, ventas:540, unidad:'und' },
    { id:5, sku:'GS-NTR', nombre:'Guantes nitrilo reforzado (par)', cat:'Seguridad', prov:'ProSafety EIRL', stock:1200, stockMin:300, compra:3.2, venta:6.5, ventas:1850, unidad:'par' },
    { id:6, sku:'TL-13MM', nombre:'Taladro percutor 1/2" 750W', cat:'Herramientas', prov:'Industrias Lima', stock:34, stockMin:20, compra:185, venta:289, ventas:96, unidad:'und' },
    { id:7, sku:'DC-115', nombre:'Disco de corte metal 4.5"', cat:'Herramientas', prov:'Industrias Lima', stock:95, stockMin:200, compra:2.1, venta:4.2, ventas:2400, unidad:'und' },
    { id:8, sku:'PE-GAL', nombre:'Pintura epóxica gris (galón)', cat:'Construcción', prov:'Industrias Lima', stock:72, stockMin:30, compra:64, venta:98, ventas:130, unidad:'gal' },
    { id:9, sku:'CB-25', nombre:'Cable THW 12 AWG (rollo 100m)', cat:'Eléctrico', prov:'ElectroPerú SAC', stock:28, stockMin:25, compra:145, venta:219, ventas:88, unidad:'rollo' },
    { id:10, sku:'SD-E6011', nombre:'Soldadura E6011 1/8" (kg)', cat:'Construcción', prov:'Aceros del Sur', stock:310, stockMin:100, compra:9.8, venta:15.5, ventas:420, unidad:'kg' },
    { id:11, sku:'BM-05', nombre:'Bomba periférica 0.5 HP', cat:'Eléctrico', prov:'HidroTec', stock:22, stockMin:15, compra:168, venta:255, ventas:64, unidad:'und' },
    { id:12, sku:'MG-12', nombre:'Manguera reforzada 1/2" (m)', cat:'Plomería', prov:'HidroTec', stock:540, stockMin:200, compra:2.8, venta:5.2, ventas:760, unidad:'m' },
    { id:13, sku:'CM-42', nombre:'Cemento Tipo I (bolsa 42.5kg)', cat:'Construcción', prov:'Aceros del Sur', stock:14, stockMin:60, compra:26, venta:33, ventas:980, unidad:'bolsa' },
    { id:14, sku:'LL-INT', nombre:'Llave inglesa 12" cromada', cat:'Herramientas', prov:'FerroAndes', stock:130, stockMin:50, compra:22, venta:38, ventas:175, unidad:'und' },
    { id:15, sku:'BR-PRO', nombre:'Botas de seguridad punta acero', cat:'Seguridad', prov:'ProSafety EIRL', stock:88, stockMin:60, compra:58, venta:92, ventas:240, unidad:'par' },
  ],
};

let _toastTimer = null;
function setState(patch){
  const next = (typeof patch === 'function') ? patch(STATE) : patch;
  STATE = Object.assign({}, STATE, next);
  render();
}
function flash(msg){
  setState({toast: msg});
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>setState({toast:null}), 2600);
}

/* ---------- mutations ---------- */
function go(nav){ setState({nav, menuOpen:false}); }
function setRole(role){
  const allowed = (ROLE_PERMS[STATE.nav]||[]).includes(role);
  setState({ role, nav: allowed ? STATE.nav : 'dashboard' });
}
function openModal(prod){
  const blank = { id:null, sku:'', nombre:'', cat:CATS[0], prov:Object.keys(SUPPLIERS_META)[0], stock:0, stockMin:0, compra:0, venta:0, ventas:0, unidad:'und' };
  setState({ modal: prod ? prod.id : 'new', draft: prod ? Object.assign({}, prod) : blank });
}
function closeModal(){ setState({modal:null, draft:null}); }
function setField(k){
  return (e)=>{
    const isNum = ['stock','stockMin','compra','venta'].includes(k);
    const val = isNum ? (parseFloat(e.target.value)||0) : e.target.value;
    setState(s=>({draft: Object.assign({}, s.draft, {[k]: val})}));
  };
}
function saveProduct(){
  const d = STATE.draft;
  if(!d.nombre.trim()){ flash('Ingrese el nombre del producto'); return; }
  setState(s=>{
    let products = s.products.slice();
    if(d.id){ products = products.map(p=> p.id===d.id ? Object.assign({},d) : p); }
    else { products = [Object.assign({},d,{id: Date.now()}), ...products]; }
    return { products, modal:null, draft:null };
  });
  flash(d.id ? 'Producto actualizado' : 'Producto agregado al inventario');
}
function askDelete(prod){ setState({confirmDel: prod}); }
function doDelete(){
  const id = STATE.confirmDel.id;
  setState(s=>({ products: s.products.filter(p=>p.id!==id), confirmDel:null }));
  flash('Producto eliminado');
}
function qSetItem(sku, delta){
  setState(s=>{
    const items = s.quote.items.map(i=> i.sku===sku ? Object.assign({},i,{qty: Math.max(1, i.qty+delta)}) : i);
    return { quote: Object.assign({}, s.quote, {items}) };
  });
}
function qRemove(sku){ setState(s=>({ quote: Object.assign({}, s.quote, {items: s.quote.items.filter(i=>i.sku!==sku)}) })); }
function qAdd(){
  const fallback = (STATE.products.find(p=> !STATE.quote.items.some(i=>i.sku===p.sku))||{}).sku;
  const sku = STATE.quoteAddSel || fallback;
  if(!sku) return;
  if(STATE.quote.items.some(i=>i.sku===sku)){ qSetItem(sku, 1); return; }
  setState(s=>({ quote: Object.assign({}, s.quote, {items:[...s.quote.items, {sku, qty:1}]}) }));
}
function qField(k){
  return (e)=>{
    const isNum = k==='addCost';
    const val = isNum ? (parseFloat(e.target.value)||0) : e.target.value;
    setState(s=>({ quote: Object.assign({}, s.quote, {[k]: val}) }));
  };
}

/* ---------- computed values (port of renderVals) ---------- */
function computeVals(){
  const S = STATE;
  const byId = (sku)=> S.products.find(p=>p.sku===sku);

  // nav
  const navOrder = ['dashboard','productos','cotizador','reportes','proveedores','usuarios'];
  const labels = { dashboard:'Panel principal', productos:'Productos', cotizador:'Cotizaciones', reportes:'Reportes', proveedores:'Proveedores', usuarios:'Usuarios y accesos' };
  const lowCount = S.products.filter(p=>p.stock<=p.stockMin).length;
  const navItems = navOrder.filter(k=> ROLE_PERMS[k].includes(S.role)).map(k=>{
    const active = S.nav===k;
    return { key:k, label: labels[k], icon:ICONS[k], go:()=>go(k),
      bg: active ? 'var(--accent)' : 'transparent', color: active ? '#fff' : 'rgba(255,255,255,.66)',
      badge: k==='productos' && lowCount ? String(lowCount) : '' };
  });

  // KPIs
  const valorInv = S.products.reduce((a,p)=>a + p.stock*p.compra, 0);
  const margProm = S.products.reduce((a,p)=>a + margenPct(p),0)/S.products.length;
  const ventasMes = MONTHLY[MONTHLY.length-1].v*1000;
  const kpis = [
    { label:'Ventas del mes', value:mk(ventasMes), delta:'▲ 12.6%', dc:'var(--green)', db:'#E7F3EC', tint:'var(--softorange)', ic:'var(--accent)', icon:'M3 3v18h18M18 17V9M13 17V5M8 17v-3' },
    { label:'Valor de inventario', value:mk(valorInv), delta:'▲ 3.2%', dc:'var(--green)', db:'#E7F3EC', tint:'#E9F0F4', ic:'var(--steel)', icon:'M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96 12 12.01l8.73-5.05M12 22.08V12' },
    { label:'Margen promedio', value:margProm.toFixed(1)+'%', delta:'▲ 1.4%', dc:'var(--green)', db:'#E7F3EC', tint:'#EEEAF2', ic:'#7C5A8C', icon:'M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6' },
    { label:'Alertas de stock', value:String(lowCount), delta:'Revisar', dc:'var(--accent2)', db:'var(--softorange)', tint:'#FBE9E0', ic:'var(--red)', icon:'M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01' },
  ];

  // ventas chart
  const mv = MONTHLY, maxV = Math.max.apply(null, mv.map(d=>d.v));
  const W=620,H=200,pad=14;
  const pts = mv.map((d,i)=>{ const x = pad + i*((W-2*pad)/(mv.length-1)); const y = H-pad - (d.v/maxV)*(H-2*pad-14); return [x,y]; });
  const ventasPoints = pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const ventasArea = 'M'+pad+','+(H-pad)+' L'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L')+' L'+(W-pad)+','+(H-pad)+' Z';

  // top products
  const top = S.products.slice().sort((a,b)=>b.ventas-a.ventas).slice(0,6);
  const maxVentas = Math.max.apply(null, top.map(p=>p.ventas));
  const barCols = ['var(--accent)','#3B6B8F','#2A9D8F','#C2891C','#7C5A8C','#B5663A'];
  const topBars = top.map((p,i)=>({ sku:p.sku, val:num(p.ventas), h: Math.max(8,(p.ventas/maxVentas)*100), col:barCols[i] }));

  // low stock
  const lowStock = S.products.filter(p=>p.stock<=p.stockMin).sort((a,b)=>(a.stock/a.stockMin)-(b.stock/b.stockMin)).slice(0,5).map(p=>({
    nombre:p.nombre, sku:p.sku, prov:p.prov, stock:p.stock, stockMin:p.stockMin, unidad:p.unidad,
    dot: p.stock < p.stockMin*0.5 ? 'var(--red)' : 'var(--amber)'
  }));

  // proveedores agg
  const provAgg = {};
  S.products.forEach(p=>{ provAgg[p.prov] = (provAgg[p.prov]||0) + p.stock*p.compra; });
  const provSorted = Object.keys(provAgg).map(name=>({name, val:provAgg[name]})).sort((a,b)=>b.val-a.val);
  const maxProv = provSorted[0]?provSorted[0].val:1;
  const provBars = provSorted.map((s,i)=>({ name:s.name, val:mk(s.val), w: Math.max(6,(s.val/maxProv)*100), col: barCols[i%barCols.length] }));

  // productos table
  let list = S.products.slice();
  if(S.cat!=='Todas') list = list.filter(p=>p.cat===S.cat);
  if(S.search.trim()){ const q=S.search.toLowerCase(); list = list.filter(p=> (p.nombre+' '+p.sku+' '+p.prov).toLowerCase().includes(q)); }
  const rows = list.map(p=>{
    const mp = margenPct(p);
    const ratio = p.stock/p.stockMin;
    const sCol = ratio<0.5?'var(--red)':ratio<1?'var(--amber)':'var(--green)';
    const cc = CAT_COLORS[p.cat]||'#3B6B8F';
    return Object.assign({}, p, { compraF:m(p.compra), ventaF:m(p.venta), margen:mp.toFixed(0)+'%',
      mCol: mp>=35?'var(--green)':mp>=20?'var(--amber)':'var(--red)',
      stockPct: Math.min(100, (p.stock/(p.stockMin*2))*100), sCol,
      catBg: cc+'1a', catCol: cc,
      edit:()=>openModal(p), del:()=>askDelete(p) });
  });
  const filteredValue = m(list.reduce((a,p)=>a+p.stock*p.compra,0));
  const canEdit = (S.role==='Administrador' || S.role==='Almacén');

  const catChips = ['Todas'].concat(CATS).map(c=>({ label:c, pick:()=>setState({cat:c}),
    bg: S.cat===c?'var(--ink)':'transparent', color: S.cat===c?'#fff':'var(--soft)' }));

  // cotizador
  const quoteLines = S.quote.items.map(it=>{ const p=byId(it.sku)||{nombre:it.sku,venta:0}; const importe = p.venta*it.qty;
    return { sku:it.sku, nombre:p.nombre, qty:it.qty, unit:m(p.venta), importe:m(importe),
      inc:()=>qSetItem(it.sku,1), dec:()=>qSetItem(it.sku,-1), remove:()=>qRemove(it.sku) }; });
  const subtotal = S.quote.items.reduce((a,it)=>{ const p=byId(it.sku); return a + (p?p.venta*it.qty:0); },0);
  const base = subtotal + Number(S.quote.addCost||0);
  const igv = base*0.18, total = base*1.18;
  const cost = S.quote.items.reduce((a,it)=>{ const p=byId(it.sku); return a + (p?p.compra*it.qty:0); },0);
  const profit = base - cost;
  const marginPct = base>0 ? (profit/base)*100 : 0;
  const addable = S.products.filter(p=> !S.quote.items.some(i=>i.sku===p.sku)).map(p=>({sku:p.sku, label:p.nombre+'  ·  '+m(p.venta)}));

  // reportes: donut + margen cat
  const catVal = CATS.map(c=>({ label:c, val: S.products.filter(p=>p.cat===c).reduce((a,p)=>a+p.stock*p.compra,0), col:CAT_COLORS[c] }));
  const totVal = catVal.reduce((a,c)=>a+c.val,0)||1;
  let acc = 0; const stops = catVal.map(c=>{ const start=acc/totVal*100; acc+=c.val; const end=acc/totVal*100; return c.col+' '+start.toFixed(1)+'% '+end.toFixed(1)+'%'; });
  const donutBg = 'conic-gradient('+stops.join(', ')+')';
  const donutLegend = catVal.map(c=>({ label:c.label, col:c.col, pct: ((c.val/totVal)*100).toFixed(0)+'%' }));

/* ---------- render ---------- */
const ROOT_STYLE = "--ink:#16181D; --ink2:#232730; --panel:#191C22; --panel2:#23272F; --bg:#EEEDE8; --card:#FFFFFF; --line:#E4E3DD; --line2:#EFEEE9; --muted:#73777E; --soft:#3A3F47; --accent:#F2541B; --accent2:#D8430F; --steel:#3B6B8F; --green:#2E8B57; --amber:#C2891C; --red:#C0392B; --softorange:#FBE9E0; font-family:'IBM Plex Sans',system-ui,sans-serif; color:#16181D; -webkit-font-smoothing:antialiased; line-height:1.45;";

const appEl = document.getElementById('app');

function render(){
  _handlers = [];
  const V = computeVals();
  let html = '';
  if(V.isLogin) html += tLogin(V);
  if(V.isApp) html += tApp(V);
  html += tModal(V);
  html += tDelete(V);
  html += tToast(V);

  // preserve focus + caret across innerHTML swap
  const a = document.activeElement;
  let field=null, ss=null, se=null;
  if(a && appEl.contains(a) && a.dataset && a.dataset.field){ field=a.dataset.field; try{ ss=a.selectionStart; se=a.selectionEnd; }catch(_){ } }

  appEl.innerHTML = '<div style="'+ROOT_STYLE+'">'+html+'</div>';

  if(field){
    const n = appEl.querySelector('[data-field="'+field+'"]');
    if(n){ n.focus(); if(ss!=null){ try{ n.setSelectionRange(ss,se); }catch(_){ } } }
  }
}

/* ---------- delegated event wiring (attached once) ---------- */
appEl.addEventListener('click', (e)=>{
  const t = e.target.closest('[data-click]');
  if(!t || !appEl.contains(t)) return;
  const fn = _handlers[+t.getAttribute('data-click')];
  if(typeof fn === 'function') fn(e);
});
appEl.addEventListener('input', (e)=>{
  const t = e.target.closest('[data-input]');
  if(!t) return;
  const fn = _handlers[+t.getAttribute('data-input')];
  if(typeof fn === 'function') fn(e);
});
appEl.addEventListener('change', (e)=>{
  const t = e.target.closest('[data-change]');
  if(!t) return;
  const fn = _handlers[+t.getAttribute('data-change')];
  if(typeof fn === 'function') fn(e);
});
appEl.addEventListener('mouseover', (e)=>{
  const t = e.target.closest('[data-hover]');
  if(!t || !appEl.contains(t)) return;
  if(t._oc == null) t._oc = t.getAttribute('style') || '';
  t.setAttribute('style', t._oc + ';' + t.getAttribute('data-hover'));
});
appEl.addEventListener('mouseout', (e)=>{
  const t = e.target.closest('[data-hover]');
  if(!t || !appEl.contains(t)) return;
  if(t._oc != null) t.setAttribute('style', t._oc);
});

render();

})();
</script>
</body>
</html>
